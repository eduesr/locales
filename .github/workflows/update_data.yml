name: Actualizar Locales desde Gmail

on:
  schedule:
    # Se ejecuta cada 6 horas (en el minuto 0)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Permite ejecutarlo manualmente desde GitHub

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    # Otorgar permisos al bot de GitHub para hacer commit y push
    permissions:
      contents: write

    steps:
      - name: Descargar el código del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Crear archivos de credenciales secretas
        run: |
          echo '${{ secrets.GMAIL_CREDENTIALS }}' > credentials.json
          echo '${{ secrets.GMAIL_TOKEN }}' > token.json

      - name: Ejecutar script de extracción
        run: python fetch_emails.py

      - name: Eliminar credenciales por seguridad
        run: |
          rm credentials.json
          rm token.json

      - name: Hacer commit y push si hay cambios
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add data.json
          # Solo hacemos commit si el archivo data.json ha cambiado
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated update: Nuevos locales extraídos" && git push)
