<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Namibia Investing - Oportunidades Inmobiliarias</title>
    <meta name="description" content="Encuentra las mejores ofertas de locales comerciales en compra en la ciudad de Vigo.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
    
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-WTDZMJ71K8"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-WTDZMJ71K8');
    </script>
</head>
<body>
    <header class="header">
        <div class="container header-content">
            <div class="avatar-boss" style="margin-bottom: 15px; display: flex; justify-content: center;">
                <span class="avatar boss">Oso 🐻</span>
            </div>
            <h1>Namibia Investing</h1>
            <div class="team-avatars" style="margin-top: 15px;">
                <div class="avatar-team">
                    <span class="avatar small">Drome 🐪</span>
                    <span class="avatar small">Garro 🪝</span>
                    <span class="avatar small">Fino 🥢</span>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="top-controls">
            <div id="region-selector" class="region-tabs">
                <button class="region-tab active" data-region="Vigo">Área de <strong class="mobile-break">Vigo</strong></button>
                <button class="region-tab" data-region="Santiago">Área de <strong class="mobile-break">Santiago</strong></button>
                <button class="region-tab desktop-only" data-region="Descartados">Oso descartados 🐻</button>
            </div>
            
            <div class="actions-container">
                <div class="search-container">
                    <input type="text" id="search-input" placeholder="Buscar local, calle...">
                    <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </div>
                
                <div class="mobile-menu-container mobile-only">
                    <button id="meatball-btn" class="meatball-btn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="5" r="2"></circle>
                            <circle cx="12" cy="12" r="2"></circle>
                            <circle cx="12" cy="19" r="2"></circle>
                        </svg>
                    </button>
                    <div id="mobile-dropdown" class="dropdown-menu">
                        <button class="region-tab dropdown-item" data-region="Descartados">Oso descartados 🐻</button>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="filters-summary">
            <div id="city-filters" class="city-filters">
                <!-- Las pastillas (pills) se insertarán aquí dinámicamente -->
            </div>
            <span id="results-count" class="results-count">0 locales encontrados</span>
        </div>

        <div id="listings-grid" class="grid">
            <!-- Las tarjetas se insertarán aquí dinámicamente con JS -->
            <div class="loader" id="loader">Cargando datos...</div>
        </div>
    </main>

    <div id="confirm-modal" class="modal">
        <div class="modal-content">
            <h3>¿Seguro que quieres descartar este local?</h3>
            <p>Lo pasaremos a la lista de descartados.</p>
            <div class="modal-actions">
                <button id="modal-cancel" class="btn" style="background-color: #94a3b8; color: white;">Cancelar</button>
                <button id="modal-confirm" class="btn" style="background-color: #ef4444; color: white;">Descartar 🐻</button>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 - Namibia Investing</p>
        </div>
    </footer>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    
    <!-- Custom JS -->
    <script src="app.js"></script>
</body>
</html>
